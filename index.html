<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Essay Rewriter - 降 AIGC 页面</title>
  <style>
    :root {
      --bg: #f5f6f0;
      --panel: #fffdf7;
      --ink: #1f2a1f;
      --muted: #5d665d;
      --line: #d6dbc8;
      --brand: #2f6f4f;
      --brand-strong: #1e4b35;
      --warn: #9a4300;
      --ok: #145e3e;
      --shadow: 0 18px 30px rgba(0, 0, 0, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 10%, #e7f1e8 0%, transparent 35%),
        radial-gradient(circle at 88% 85%, #efe7d9 0%, transparent 38%),
        var(--bg);
      min-height: 100vh;
    }

    .container {
      width: min(1200px, 94vw);
      margin: 28px auto;
      display: grid;
      gap: 14px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
    }

    .top {
      padding: 18px;
      display: grid;
      gap: 12px;
    }

    .title {
      margin: 0;
      font-size: 24px;
      line-height: 1.3;
      letter-spacing: 0.2px;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .config {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(4, minmax(130px, 1fr));
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      font-size: 13px;
      color: var(--muted);
    }

    input,
    textarea,
    button {
      font: inherit;
    }

    input,
    textarea {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 11px;
      background: #fff;
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    input:focus,
    textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(47, 111, 79, 0.16);
    }

    .grid {
      display: grid;
      gap: 14px;
      grid-template-columns: 1fr 1fr;
    }

    .panel {
      padding: 14px;
      display: grid;
      gap: 10px;
      align-content: start;
      min-height: 500px;
    }

    .panel h2 {
      margin: 0;
      font-size: 18px;
    }

    .panel textarea {
      min-height: 260px;
      resize: vertical;
      line-height: 1.65;
    }

    #inputText {
      min-height: 420px;
    }

    #firstOutputText,
    #secondOutputText {
      min-height: 190px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.2s ease;
    }

    button:active {
      transform: translateY(1px);
    }

    .primary {
      color: #fff;
      background: linear-gradient(145deg, var(--brand), var(--brand-strong));
    }

    .secondary {
      color: var(--ink);
      background: #e9efdd;
      border: 1px solid #cfdbc2;
    }

    .ghost {
      color: var(--muted);
      background: #f8f9f4;
      border: 1px solid var(--line);
    }

    .status {
      font-size: 13px;
      color: var(--muted);
      margin-left: auto;
    }

    .status.ok {
      color: var(--ok);
    }

    .status.warn {
      color: var(--warn);
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      margin: 0;
    }

    @media (max-width: 960px) {
      .config {
        grid-template-columns: 1fr 1fr;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .panel {
        min-height: auto;
      }

      .panel textarea {
        min-height: 250px;
      }
    }

    @media (max-width: 560px) {
      .config {
        grid-template-columns: 1fr;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .status {
        grid-column: 1 / -1;
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="card top">
      <h1 class="title">降 AIGC 改写助手</h1>
      <p class="sub">按 Dataset 中同款指令发送给模型：固定 system + user 前缀“请将文本改为更自然的人类风格”。</p>

      <div class="config">
        <div class="field">
          <label for="baseUrl">Base URL（你稍后填写）</label>
          <input id="baseUrl" type="text" placeholder="例如: https://api.openai.com/v1" />
        </div>
        <div class="field">
          <label for="modelName">模型名（你稍后填写）</label>
          <input id="modelName" type="text" placeholder="例如: gpt-4o-mini" />
        </div>
        <div class="field">
          <label for="apiKey">API Key（用户自行填写）</label>
          <input id="apiKey" type="password" placeholder="sk-..." autocomplete="off" />
        </div>
        <div class="field">
          <label for="temperature">Temperature</label>
          <input id="temperature" type="number" min="0" max="2" step="0.1" value="0.7" />
        </div>
      </div>
      <p class="hint">提示：页面仅在当前浏览器本地运行，请勿在不可信环境输入密钥。</p>
    </section>

    <section class="grid">
      <article class="card panel">
        <h2>左栏：输入原文</h2>
        <textarea id="inputText" placeholder="把需要降 AIGC 的原文粘贴到这里..."></textarea>
        <div class="actions">
          <button id="rewriteBtn" class="primary">开始降 AIGC 改写</button>
          <button id="clearBtn" class="ghost">清空输入</button>
          <span id="status" class="status">等待操作</span>
        </div>
      </article>

      <article class="card panel">
        <h2>右栏：两层结果</h2>
        <label for="firstOutputText">一层：降 AIGC 结果</label>
        <textarea id="firstOutputText" placeholder="第一层模型结果..." readonly></textarea>
        <label for="secondOutputText">二层：按原文格式对齐（仅改格式）</label>
        <textarea id="secondOutputText" placeholder="第二层模型结果..." readonly></textarea>
        <div class="actions">
          <button id="copyFirstBtn" class="secondary">复制一层</button>
          <button id="copySecondBtn" class="secondary">复制二层</button>
          <button id="clearOutBtn" class="ghost">清空结果</button>
        </div>
      </article>
    </section>
  </main>

  <script>
    const SYSTEM_PROMPT = "你是一个学术文本改写助手。将AI生成的学术文本改写为更符合人类写作习惯的风格，保持核心学术内容不变。";
    const USER_PREFIX = "请将文本改为更自然的人类风格。\n\n";
    const FORMAT_SYSTEM_PROMPT = "你是一个严格的文本格式整理助手。只允许调整格式，不允许改动文本内容。";
    const FORMAT_USER_PREFIX = "请按要求进行二次整理。\n\n";

    const baseUrlEl = document.getElementById("baseUrl");
    const modelEl = document.getElementById("modelName");
    const keyEl = document.getElementById("apiKey");
    const tempEl = document.getElementById("temperature");
    const inputEl = document.getElementById("inputText");
    const firstOutputEl = document.getElementById("firstOutputText");
    const secondOutputEl = document.getElementById("secondOutputText");
    const statusEl = document.getElementById("status");
    const rewriteBtn = document.getElementById("rewriteBtn");
    const clearBtn = document.getElementById("clearBtn");
    const copyFirstBtn = document.getElementById("copyFirstBtn");
    const copySecondBtn = document.getElementById("copySecondBtn");
    const clearOutBtn = document.getElementById("clearOutBtn");

    // Save non-sensitive settings locally for convenience.
    const STORAGE_KEY = "essay_rewriter_settings";

    function setStatus(text, type = "") {
      statusEl.textContent = text;
      statusEl.className = "status" + (type ? " " + type : "");
    }

    function loadSettings() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const data = JSON.parse(raw);
        baseUrlEl.value = data.baseUrl || "";
        modelEl.value = data.model || "";
        tempEl.value = typeof data.temperature === "number" ? String(data.temperature) : "0.7";
      } catch (_) {
        // Ignore broken local settings.
      }
    }

    function saveSettings() {
      const data = {
        baseUrl: baseUrlEl.value.trim(),
        model: modelEl.value.trim(),
        temperature: Number(tempEl.value)
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    async function callChatCompletion({ baseUrl, apiKey, payload }) {
      const endpoint = baseUrl.replace(/\/$/, "") + "/chat/completions";
      const res = await fetch(endpoint, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + apiKey
        },
        body: JSON.stringify(payload)
      });

      if (!res.ok) {
        const errText = await res.text();
        throw new Error("HTTP " + res.status + " - " + errText);
      }

      const data = await res.json();
      const answer = data?.choices?.[0]?.message?.content;
      if (!answer) {
        throw new Error("模型返回为空，未获取到文本结果。");
      }
      return answer.trim();
    }

    function buildFormatOnlyPrompt(originalText, firstPassText) {
      return (
        FORMAT_USER_PREFIX +
        "你将收到两段文本：原文与一层降AIGC结果。\n" +
        "请只按照原文的格式特征（段落结构、换行、标题层级、列表样式、标点风格、编号样式）整理一层结果。\n" +
        "严格要求：\n" +
        "1. 只能改格式，不能改任何内容实词。\n" +
        "2. 不得增删句子、不得改写语义、不得替换同义词。\n" +
        "3. 不要输出解释，不要输出对比，只输出整理后的最终文本。\n\n" +
        "【原文】\n" + originalText + "\n\n" +
        "【一层降AIGC结果】\n" + firstPassText
      );
    }

    async function rewriteText() {
      const baseUrl = baseUrlEl.value.trim();
      const model = modelEl.value.trim();
      const apiKey = keyEl.value.trim();
      const text = inputEl.value.trim();
      const temperature = Number(tempEl.value);

      if (!baseUrl || !model || !apiKey) {
        setStatus("请先填写 Base URL、模型名、API Key", "warn");
        return;
      }
      if (!text) {
        setStatus("请先输入需要改写的文本", "warn");
        return;
      }

      saveSettings();
      rewriteBtn.disabled = true;
      setStatus("一层改写中...", "");

      try {
        const firstPayload = {
          model,
          temperature: Number.isFinite(temperature) ? temperature : 0.7,
          enable_thinking: false,
          messages: [
            { role: "system", content: SYSTEM_PROMPT },
            { role: "user", content: USER_PREFIX + text }
          ]
        };
        const firstPass = await callChatCompletion({
          baseUrl,
          apiKey,
          payload: firstPayload
        });
        firstOutputEl.value = firstPass;

        setStatus("二层格式对齐中...", "");
        const secondPayload = {
          model,
          temperature: 0,
          enable_thinking: false,
          messages: [
            { role: "system", content: FORMAT_SYSTEM_PROMPT },
            { role: "user", content: buildFormatOnlyPrompt(text, firstPass) }
          ]
        };
        const secondPass = await callChatCompletion({
          baseUrl,
          apiKey,
          payload: secondPayload
        });
        secondOutputEl.value = secondPass;

        setStatus("两层处理完成", "ok");
      } catch (err) {
        console.error(err);
        setStatus("请求失败：" + (err?.message || "未知错误"), "warn");
      } finally {
        rewriteBtn.disabled = false;
      }
    }

    rewriteBtn.addEventListener("click", rewriteText);
    clearBtn.addEventListener("click", () => {
      inputEl.value = "";
      setStatus("已清空输入");
    });
    clearOutBtn.addEventListener("click", () => {
      firstOutputEl.value = "";
      secondOutputEl.value = "";
      setStatus("已清空结果");
    });
    copyFirstBtn.addEventListener("click", async () => {
      const text = firstOutputEl.value.trim();
      if (!text) {
        setStatus("一层结果为空", "warn");
        return;
      }
      try {
        await navigator.clipboard.writeText(text);
        setStatus("已复制一层结果", "ok");
      } catch (_) {
        setStatus("复制失败，请手动复制", "warn");
      }
    });
    copySecondBtn.addEventListener("click", async () => {
      const text = secondOutputEl.value.trim();
      if (!text) {
        setStatus("没有可复制的内容", "warn");
        return;
      }
      try {
        await navigator.clipboard.writeText(text);
        setStatus("已复制二层结果", "ok");
      } catch (_) {
        setStatus("复制失败，请手动复制", "warn");
      }
    });

    loadSettings();
  </script>
</body>
</html>
